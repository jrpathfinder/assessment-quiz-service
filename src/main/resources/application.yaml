spring:
  application:
    name: quiz-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quiz_db}
    username: ${DB_USER:quiz_user}
    password: ${DB_PASSWORD:quiz_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${PORT:8080}

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

# JWT configuration
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-32-chars}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}


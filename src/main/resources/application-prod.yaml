spring:
  datasource:
    # Cloud Run connects to Cloud SQL via Unix socket (Cloud SQL Auth Proxy built into Cloud Run)
    # Format: jdbc:postgresql:///DB_NAME?cloudSqlInstance=PROJECT:REGION:INSTANCE&socketFactory=...
    url: ${DB_URL:jdbc:postgresql:///quiz_db?cloudSqlInstance=quiz-trainer-491807:us-central1:ai-trainer-project&socketFactory=com.google.cloud.sql.postgres.SocketFactory&user=quiz_user&password=quiz_pass}
    username: ${DB_USER:quiz_user}
    password: ${DB_PASSWORD:quiz_pass}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    org.flywaydb: INFO
    root: WARN
    org.java.assesment: INFO

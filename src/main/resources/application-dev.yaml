spring:
  datasource:
    url: jdbc:h2:mem:quiz_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: quiz_user
    password: quiz_pass
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # Hibernate manages schema for in-memory H2
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false            # Flyway is for PostgreSQL (prod); Hibernate handles H2
